openapi: 3.0.3
info:
  title: Demo Users API
  version: 1.0.0
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /users/{id}:
    get:
      summary: Get user by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                type: object
                required: [id, name, username, email]
                properties:
                  id:
                    type: integer
                    description: Numeric user id.
                  name:
                    type: string
                    description: Full name.
                  username:
                    type: string
                    description: Unique handle.
                  email:
                    type: string
                    format: email
                    description: User email address.
                  phone:
                    type: string
                  website:
                    type: string
                  address:
                    type: object
                    properties:
                      city:
                        type: string
                  company:
                    type: object
                    properties:
                      name:
                        type: string
