openapi: 3.0.3
info:
  title: Shop Category Items API
  version: 1.0.0
servers:
  - url: http://63.188.0.184/en/api
paths:
  /shop/2/category/4/items/:
    get:
      summary: List shop category items
      parameters:
        - name: start
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: language_code
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated shop items
          content:
            application/json:
              schema:
                type: object
                required: [serializer_data]
                properties:
                  serializer_data:
                    type: object
                    required: [total_size, limit, start, serializer_data]
                    properties:
                      total_size:
                        type: integer
                      limit:
                        type: integer
                      start:
                        type: integer
                      serializer_data:
                        type: array
                        items:
                          type: object
                          required: [id, name, code, sell_price, shop]
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            name_en:
                              type: string
                              nullable: true
                            code:
                              type: string
                            quantity:
                              type: number
                            image:
                              type: string
                              nullable: true
                            sell_price:
                              type: number
                            actual_price:
                              type: number
                            discount_price:
                              type: number
                              nullable: true
                            discounted_quantity:
                              type: integer
                              nullable: true
                            shop:
                              type: integer
                            unit:
                              type: object
                              required: [id, name]
                              properties:
                                id:
                                  type: integer
                                name:
                                  type: string
                                size:
                                  type: integer
                            vat_category:
                              type: object
                              required: [id, name]
                              properties:
                                id:
                                  type: integer
                                name:
                                  type: string
                            category:
                              type: object
                              required: [id, name]
                              properties:
                                id:
                                  type: integer
                                name:
                                  type: string
