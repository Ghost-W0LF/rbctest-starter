openapi: 3.0.3
info:
  title: Demo Users API
  version: 1.0.0
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /users/{id}:
    get:
      summary: Get user by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                type: object
                required: [id, name, username, email, address]
                properties:
                  id:
                    type: integer
                    description: Numeric user id.
                  name:
                    type: string
                  username:
                    type: string
                  email:
                    type: string
                    format: email
                  phone:
                    type: string
                  website:
                    type: string
                  address:
                    type: object
                    required: [geo]
                    properties:
                      street:
                        type: string
                      city:
                        type: string
                      zipcode:
                        type: string
                      geo:
                        type: object
                        required: [lat, lng]
                        properties:
                          lat:
                            type: number
                            description: Latitude coordinate.
                          lng:
                            type: number
                            description: Longitude coordinate.
